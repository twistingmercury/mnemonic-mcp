name: Mnemonic CD

on:
  workflow_run:
    workflows: ["Mnemonic CI"]
    types: [completed]
    branches: [main, develop]

jobs:
  push:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: mnemonic-image
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Docker image
        run: docker load -i mnemonic-image.tar

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate branch name
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ ! "$BRANCH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "Invalid branch name: $BRANCH"
            exit 1
          fi

      - name: Tag and push image
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            docker push ghcr.io/twistingmercury/mnemonic:latest
          fi
          docker tag ghcr.io/twistingmercury/mnemonic:latest ghcr.io/twistingmercury/mnemonic:${{ github.event.workflow_run.head_branch }}
          docker push ghcr.io/twistingmercury/mnemonic:${{ github.event.workflow_run.head_branch }}
