name: Mnemonic Application CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/mnemonic/internal/**'
      - 'src/mnemonic/cmd/**'
      - 'src/mnemonic/go.mod'
      - 'src/mnemonic/go.sum'
      - 'src/mnemonic/build/**'
      - 'src/mnemonic/tests/**'
      - '.github/workflows/mnemonic-app-ci.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/mnemonic/internal/**'
      - 'src/mnemonic/cmd/**'
      - 'src/mnemonic/go.mod'
      - 'src/mnemonic/go.sum'
      - 'src/mnemonic/build/**'
      - 'src/mnemonic/tests/**'
      - '.github/workflows/mnemonic-app-ci.yaml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: src/mnemonic

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build script
        env:
          LOCAL_BUILD: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: ./build/build.sh
