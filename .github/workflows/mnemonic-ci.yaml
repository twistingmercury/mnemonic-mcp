name: Mnemonic CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/internal/**"
      - "src/cmd/**"
      - "src/go.mod"
      - "src/go.sum"
      - "src/build/**"
      - ".github/workflows/mnemonic-ci.yaml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/internal/**"
      - "src/cmd/**"
      - "src/go.mod"
      - "src/go.sum"
      - "src/build/**"
      - ".github/workflows/mnemonic-ci.yaml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run build script
        run: ./build/build.sh

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            docker push ghcr.io/twistingmercury/mnemonic:latest
            docker push ghcr.io/twistingmercury/mnemonic:${VERSION}
          else
            docker tag ghcr.io/twistingmercury/mnemonic:latest ghcr.io/twistingmercury/mnemonic:latest-dev
            docker tag ghcr.io/twistingmercury/mnemonic:${VERSION} ghcr.io/twistingmercury/mnemonic:${VERSION}-dev
            docker push ghcr.io/twistingmercury/mnemonic:latest-dev
            docker push ghcr.io/twistingmercury/mnemonic:${VERSION}-dev
          fi
