services:
  mnemonic_api:
    image:  ghcr.io/twistingmercury/mnemonic:latest
    pull_policy: never
    container_name: mnemonic_api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/mnemonic", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5

  menmonic_tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    container_name: menmonic_tests
    environment:
      - API_URL=http://mnemonic_api:8080
    depends_on:
      mnemonic_api:
        condition: service_healthy