
services:
  postgres:
    image: ghcr.io/twistingmercury/mnemonic-postgres:v1.0.0-dev
    environment:
      POSTGRES_DB: mnemonic
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  neo4j:
    image: ghcr.io/twistingmercury/mnemonic-neo4j:v1.0.0-dev
    environment:
      NEO4J_AUTH: neo4j/mnemonic_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mnemonic_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic_mcp:
    image: ghcr.io/twistingmercury/mnemonic:latest
    pull_policy: never
    environment:
      MNEMONIC_DATABASE_POSTGRES_HOST: postgres
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable
      MNEMONIC_DATABASE_NEO4J_URI: bolt://neo4j:7687
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_OPENAI_API_KEY: sk-test-dummy
      MNEMONIC_MCP_PORT: 8081
      MNEMONIC_LOGGING_LEVEL: error
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mnemonic", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic_api:
    image: ghcr.io/twistingmercury/mnemonic-api:latest-dev
    pull_policy: always
    environment:
      MNEMONIC_DATABASE_POSTGRES_HOST: postgres
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable
      MNEMONIC_DATABASE_NEO4J_URI: bolt://neo4j:7687
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_OPENAI_API_KEY: sk-test-dummy
      MNEMONIC_LOGGING_LEVEL: error
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mnemonic-api", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic_tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    container_name: mnemonic_tests
    environment:
      - API_URL=http://mnemonic_api:8080
      - MCP_URL=http://mnemonic_mcp:8081
      - METRICS_URL=http://mnemonic_mcp:9090
    depends_on:
      mnemonic_mcp:
        condition: service_healthy
      mnemonic_api:
        condition: service_healthy
    networks:
      - mnemonic-network

volumes:
  postgres-data:
  neo4j-data:

networks:
  mnemonic-network:
    driver: bridge
