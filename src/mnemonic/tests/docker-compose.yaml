
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mnemonic
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations/postgres:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://mnemonic:mnemonic_dev@postgres:5432/mnemonic?sslmode=disable"
      - "up"
    networks:
      - mnemonic-network

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/mnemonic_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mnemonic_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic_api:
    image:  ghcr.io/twistingmercury/mnemonic:latest
    pull_policy: never
    container_name: mnemonic_api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      MNEMONIC_DATABASE_POSTGRES_HOST: postgres
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable
      MNEMONIC_DATABASE_NEO4J_URI:  bolt://neo4j:7687
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_OPENAI_API_KEY: sk-test-dummy
      MNEMONIC_MCP_PORT: 8081
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mnemonic", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic_tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    container_name: mnemonic_tests
    environment:
      - API_URL=http://mnemonic_api:8080
    depends_on:
      mnemonic_api:
        condition: service_healthy
    networks:
      - mnemonic-network

volumes:
  postgres-data:
  neo4j-data:

networks:
  mnemonic-network:
    driver: bridge
