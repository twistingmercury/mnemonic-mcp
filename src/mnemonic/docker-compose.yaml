services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mnemonic
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/mnemonic_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mnemonic_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnemonic-network

  mnemonic:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        BUILD_VER: ${BUILD_VER:-v0.0.0-dev}
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE}
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      MNEMONIC_SERVER_HOST: "0.0.0.0"
      MNEMONIC_SERVER_PORT: "8080"

      MNEMONIC_DATABASE_POSTGRES_HOST: postgres
      MNEMONIC_DATABASE_POSTGRES_PORT: "5432"
      MNEMONIC_DATABASE_POSTGRES_DATABASE: mnemonic
      MNEMONIC_DATABASE_POSTGRES_USERNAME: mnemonic
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable

      MNEMONIC_DATABASE_NEO4J_URI: bolt://neo4j:7687
      MNEMONIC_DATABASE_NEO4J_USERNAME: neo4j
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_NEO4J_DATABASE: neo4j

      MNEMONIC_OPENAI_API_KEY: ${MNEMONIC_OPENAI_API_KEY:-}

      MNEMONIC_LOGGING_LEVEL: ${LOG_LEVEL:-debug}
      MNEMONIC_LOGGING_FORMAT: ${LOG_FORMAT:-text}

      MNEMONIC_OBSERVABILITY_METRICS_ENABLED: "true"
      MNEMONIC_OBSERVABILITY_METRICS_PORT: "9090"
      MNEMONIC_OBSERVABILITY_HEALTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: on-failure
    networks:
      - mnemonic-network
    healthcheck:
      test: ["CMD", "/mnemonic", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  neo4j-data:

networks:
  mnemonic-network:
    driver: bridge
