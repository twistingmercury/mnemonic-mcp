# This docker compose file is used to run mnemonic locally so it can be developed against.

services:
  dev_postgres:
    image: ghcr.io/twistingmercury/mnemonic-postgres:v1.0.0-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnemonic
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic_dev
    ports:
      - "5433:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  dev_neo4j:
    image: ghcr.io/twistingmercury/mnemonic-neo4j:v1.0.0-dev
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/mnemonic_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - dev_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mnemonic_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  dev_mcp:
    image: ghcr.io/twistingmercury/mnemonic:latest-dev
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9090:9090"
    environment:
      MNEMONIC_DATABASE_POSTGRES_HOST: dev_postgres
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable
      MNEMONIC_DATABASE_NEO4J_URI: bolt://dev_neo4j:7687
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_OPENAI_API_KEY: ${MNEMONIC_OPENAI_API_KEY}
      MNEMONIC_MCP_PORT: 8081
      MNEMONIC_MCP_DEFAULT_SEARCH_THRESHOLD: 0.5
      MNEMONIC_LOGGING_LEVEL: debug
    depends_on:
      dev_neo4j:
        condition: service_healthy
      dev_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mnemonic", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  dev_api:
    image: ghcr.io/twistingmercury/mnemonic-api:latest-dev
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MNEMONIC_DATABASE_POSTGRES_HOST: dev_postgres
      MNEMONIC_DATABASE_POSTGRES_PASSWORD: mnemonic_dev
      MNEMONIC_DATABASE_POSTGRES_SSL_MODE: disable
      MNEMONIC_DATABASE_NEO4J_URI: bolt://dev_neo4j:7687
      MNEMONIC_DATABASE_NEO4J_PASSWORD: mnemonic_dev
      MNEMONIC_OPENAI_API_KEY: ${MNEMONIC_OPENAI_API_KEY}
      MNEMONIC_LOGGING_LEVEL: debug
    depends_on:
      dev_neo4j:
        condition: service_healthy
      dev_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mnemonic-api", "--health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

volumes:
  dev_postgres_data:
  dev_neo4j_data:

networks:
  dev_network:
    driver: bridge
