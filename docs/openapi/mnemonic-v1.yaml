  /v1/api/skills/{name}/scripts:
    parameters:
      - $ref: "#/components/parameters/skillNameParam"

    get:
      tags:
        - Skill Files
      summary: List scripts for a skill
      description: |
        Returns metadata for all script files belonging to the skill.
        Content is not included; fetch individual files to retrieve content.
      operationId: listSkillScripts
      responses:
        "200":
          description: List of script file summaries
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFileList"
              example:
                data:
                  - filename: extract.py
                    content_type: text/x-python
                    size: 2048
                    created_at: "2026-02-15T10:00:00Z"
                    updated_at: "2026-02-15T10:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - Skill Files
      summary: Upload script to a skill
      description: |
        Uploads a new script file to the skill. The filename must be unique
        within the skill's scripts collection. Maximum file size: 1MB (1048576 bytes).
        Maximum 20 script files per skill.
      operationId: createSkillScript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillFileCreate"
            example:
              filename: extract.py
              content_type: text/x-python
              content: "#!/usr/bin/env python3\nimport sys\n\ndef extract():\n    pass\n"
              encoding: utf-8
      responses:
        "201":
          description: Script uploaded
          headers:
            Location:
              $ref: "#/components/headers/Location"
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/ContentTooLarge"
        "422":
          $ref: "#/components/responses/LimitExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

