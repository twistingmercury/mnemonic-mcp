  # ==================== Operations Endpoints ====================
  /health:
    get:
      tags:
        - Operations
      summary: Health check
      description: |
        Returns component health status for PostgreSQL, PGVector, and Neo4j.
        All three components are required. Returns 503 if any component is
        unhealthy. No authentication required.
      operationId: healthCheck
      responses:
        "200":
          description: All components healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: healthy
                components:
                  postgres:
                    status: healthy
                    latency_ms: 2
                  pgvector:
                    status: healthy
                  neo4j:
                    status: healthy
                    latency_ms: 5
        "503":
          description: One or more components unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: unhealthy
                components:
                  postgres:
                    status: healthy
                    latency_ms: 2
                  pgvector:
                    status: healthy
                  neo4j:
                    status: unhealthy

  /version:
    get:
      tags:
        - Operations
      summary: Version information
      description: Returns build version and metadata. No authentication required.
      operationId: getVersion
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
              example:
                version: "0.15.0"
                commit: a1b2c3d
                build_time: "2026-02-15T10:00:00Z"
                go_version: go1.23.0

  /metrics:
    get:
      tags:
        - Operations
      summary: Prometheus metrics
      description: |
        Prometheus metrics endpoint. Returns metrics in Prometheus exposition
        format (text/plain). No authentication required.
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
