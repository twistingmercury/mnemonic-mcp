        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Patterns
      summary: Update pattern
      description: |
        Full replacement. Re-triggers enrichment if content changes.
      operationId: updatePattern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatternUpdate"
      responses:
        "204":
          description: No Content
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - Patterns
      summary: Delete pattern
      operationId: deletePattern
      responses:
        "204":
          description: Pattern deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/api/patterns/{id}/chunks:
    parameters:
      - $ref: "#/components/parameters/patternIdParam"

    get:
      tags:
        - Pattern Chunks
      summary: List chunks for a pattern
      description: |
        Returns the list of chunk summaries for a pattern. Each chunk corresponds
        to one H2 section of the pattern content. Enrichment status per chunk
        indicates whether the embedding has been generated.
        Returns 503 if the chunk repository is not configured.
      operationId: listPatternChunks
      responses:
        "200":
          description: Chunk summaries for the pattern
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternChunkList"
              example:
                chunks:
                  - chunk_index: 0
                    section_title: Overview
                    enrichment_status: enriched
                  - chunk_index: 1
                    section_title: Implementation
                    enrichment_status: enriched
                count: 2
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

