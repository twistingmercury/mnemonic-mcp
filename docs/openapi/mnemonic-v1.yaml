          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFile"
              example:
                filename: extract.py
                content_type: text/x-python
                content: "#!/usr/bin/env python3\nimport sys\n\ndef extract():\n    pass\n"
                encoding: utf-8
                size: 54
                created_at: "2026-02-15T10:00:00Z"
                updated_at: "2026-02-15T10:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - Skill Files
      summary: Replace script
      description: Replaces the content of an existing script file.
      operationId: updateSkillScript
      requestBody:
        required: true
        content:
